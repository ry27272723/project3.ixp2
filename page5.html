<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta content="initial-scale=1.0,width=device-width" name="viewport">

	<title>My Hair</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Goblin+One&family=Lexend+Giga:wght@100..900&family=Lilita+One&family=Rosarivo:ital@0;1&family=Zen+Dots&display=swap" rel="stylesheet">

	<link href="css/reset.css" rel="stylesheet" type="text/css">
	<link href="css/styles.css" rel="stylesheet" type="text/css">
	
	<script src="js/scripts.js"></script>

	<style>

		p {
			font-size: 1.5rem;
			color: white;
			font-family: 'afacad', sans-serif;
		}
		.photo {
			max-width: 600px;
			 display: block;
  			margin: 0 auto;
		}
		.text {
			margin-top: 20px;
			text-align: center;
			line-height: 2;
		}
		body {
			background: black;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100dvh;
			padding: 2rem;
			transition: opacity 1.6s ease;
		}
		.btn {
			display: inline-block;
			padding: 0.3rem 1rem;
			background-color: #ffffff;
			color: black;
			font-size: 1.2rem;
			text-decoration: none;
			margin-top: 0.5rem;
			margin-bottom: 0.5rem;
			transition: background-color 0.3s ease;
			font-family: goblin one, serif;
			text-transform: capitalize;
		}
		.btn:hover {
			animation: colorLoop 1.5s linear infinite;
		}

		@keyframes colorLoop {
		0%   { background-color: #ff6b6b; }
		25%  { background-color: #f7c948; }
		50%  { background-color: #48d2a0; }
		75%  { background-color: #6b8cff; }
		100% { background-color: #ff6b6b; }
		}
		
	</style>
</head>

<body>
	<div class="container">
		<div class="image">
			<img src="images/bathroomm.png" alt="bathroom" class="photo">
		</div>
		<div class="text">
			<p>In the mirror, my hair was a shade I had never chosen.</p>
			<a href="index.html" class="btn">chosen</a>
		</div>
	</div>


</body>
</html>
